<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 188 44" role="img" aria-label="Boba Bear Official Logo">
  <title>Boba Bear Official Logo</title>

  <!-- Bear face icon -->
  <!-- Left ear -->
  <circle cx="14" cy="11" r="7" fill="#A8D832"/>
  <circle cx="14" cy="11" r="4" fill="#1A2210"/>
  <!-- Right ear -->
  <circle cx="30" cy="11" r="7" fill="#A8D832"/>
  <circle cx="30" cy="11" r="4" fill="#1A2210"/>
  <!-- Head -->
  <circle cx="22" cy="22" r="14" fill="#A8D832"/>
  <!-- Eyes -->
  <circle cx="17" cy="19" r="2.5" fill="#1A2210"/>
  <circle cx="27" cy="19" r="2.5" fill="#1A2210"/>
  <!-- Eye shine -->
  <circle cx="18" cy="18" r="1" fill="#fff"/>
  <circle cx="28" cy="18" r="1" fill="#fff"/>
  <!-- Snout -->
  <ellipse cx="22" cy="25" rx="5" ry="3.5" fill="#1a2e0c"/>
  <!-- Nose -->
  <ellipse cx="22" cy="23.5" rx="2" ry="1.2" fill="#1A2210"/>
  <!-- Smile -->
  <path d="M19 26.5 Q22 29 25 26.5" stroke="#1A2210" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Wordmark: "Boba" in Firefly Green -->
  <text x="46" y="20"
        font-family="'Luckiest Guy', Impact, 'Arial Black', sans-serif"
        font-size="19"
        font-weight="400"
        fill="#A8D832"
        letter-spacing="1">Boba</text>

  <!-- Wordmark: "Bear" in Saffron Gold -->
  <text x="100" y="20"
        font-family="'Luckiest Guy', Impact, 'Arial Black', sans-serif"
        font-size="19"
        font-weight="400"
        fill="#F5A623"
        letter-spacing="1">Bear</text>

  <!-- Tagline below -->
  <text x="46" y="34"
        font-family="'Nunito', 'Arial', sans-serif"
        font-size="7"
        font-weight="700"
        fill="#A8D832"
        letter-spacing="2.5"
        opacity="0.75">S-TIER BOBA</text>

</svg>
